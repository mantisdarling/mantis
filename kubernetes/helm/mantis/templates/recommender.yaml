apiVersion: apps/v1
kind: Deployment
metadata:
  name: mantis-recommender
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: recommender
  template:
    metadata:
      labels:
        app: recommender
    spec:
      containers:
        - name: recommender
          image: "{{ .Values.recommender.image.repository }}:{{ .Values.recommender.image.tag }}"
          imagePullPolicy: {{ .Values.recommender.image.pullPolicy }}
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: mantis-recommender
spec:
  type: {{ .Values.recommender.service.type }}
  ports:
    - port: {{ .Values.recommender.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    app: recommender
